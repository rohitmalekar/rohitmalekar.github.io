<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Redirecting to Personal Blog...</title>
    <!-- 1. Meta refresh for instant client-side redirection -->
    <meta http-equiv="refresh" content="0; URL=https://rohitmalekar.in">
    <!-- 2. Canonical tag helps search engines pass SEO value to your new blog -->
    <link rel="canonical" href="https://rohitmalekar.in">
</head>
<body>
    <!-- 3. JavaScript fallback if the meta tag fails -->
    <script>
        window.location.replace("https://rohitmalekar.in");
    </script>
    
    <!-- 4. Manual link if all else fails -->
    <p>We have moved! If you are not redirected automatically, please follow this link: 
       <a href="https://rohitmalekar.in">Go to My Personal Blog</a>.
    </p>
</body>
</html>
